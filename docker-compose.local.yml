version: "3.9"

services:
  app:
    build: .
    container_name: wg-agent
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun
    networks:
      - ggvpn-network
    ports:
      - "8050:8050"
    environment:
      - WG_AGENT_TOKEN=8FfaWRSmNrocNh93kll9IiqjvDRyuEanSQXEF2hC43s
      - WG_ADDRESS=10.10.0.1/24
      - LOG_FILE=/var/log/wg-agent/agent.log
      - HTTP_LISTEN=:8050
      - WG_INTERFACE=wg10

networks:
  ggvpn-network:
    external: true
